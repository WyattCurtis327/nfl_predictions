bundle:
  name: nfl_predictions
  engine: direct

include:
  - resources/*.yml
  - resources/genie/*.yml

artifacts:
  nfl_predictions_wheel:
    type: whl
    dynamic_version: true
    build: python -m pip install -q build && python -m build --wheel -o dist
    path: .

sync:
  include:
    - app/**
    - src/**
    - notebooks/**
    - pipelines/**
    - staging/**
    - resources/**
    - resources/schema/**
  exclude:
    - .venv/**
    - dist/**
    - __pycache__/**
    - .git/**

variables:
  catalog:
    description: Unity Catalog name
    default: nfl
  teams_schema:
    description: UC schema for team reference data (medallion landing)
    default: landing
  schedules_schema:
    description: UC schema for schedule and game metadata (medallion landing)
    default: landing
  pbp_schema:
    description: UC schema for play-by-play tables and PBP volume (medallion landing)
    default: landing
  rosters_schema:
    description: UC schema for roster snapshots (medallion landing)
    default: landing
  players_schema:
    description: UC schema for player dimensions (medallion landing)
    default: landing
  odds_schema:
    description: UC schema for odds tables (medallion landing)
    default: landing
  predictions_schema:
    description: UC schema for prediction product tables (medallion gold)
    default: gold
  pbp_seasons:
    description: Comma-separated PBP seasons for bootstrap backfill
    default: "2024,2025"
  roster_season:
    description: Current roster season
    default: "2026"
  schedule_season:
    description: Schedule year for weekly patch
    default: "2026"
  schedule_seasons:
    description: Comma-separated seasons to merge at bootstrap/annual
    default: "2024,2025,2026"
  pbp_season:
    description: Prior completed season for annual PBP refresh
    default: "2025"
  current_pbp_season:
    description: Active season for weekly PBP append
    default: "2026"
  pbp_volume:
    description: UC Volume path for raw PBP parquet files (/Volumes/{catalog}/{pbp_schema}/raw)
    default: /Volumes/nfl/landing/raw
  min_match_rate:
    description: Minimum odds game_id match rate
    default: "0.9"
  preferred_bookmaker:
    description: Primary bookmaker for latest odds and metrics
    default: draftkings
  mlflow_experiment:
    description: MLflow experiment path for predict and grade runs
    default: /Shared/nfl_predictions
  notify_email:
    description: Job failure notification email (set via sync_bundle_env.py or BUNDLE_VAR_notify_email)
    default: ""
  n_simulations:
    description: Monte Carlo simulations per game
    default: "10000"
  market_blend:
    description: Weight given to market lines in simulation (0-1)
    default: "0.35"
  nfelo_blend:
    description: Weight given to nfelo power ratings before market blend (0-1)
    default: "0.30"
  pick_threshold:
    description: Minimum confidence to highlight a spread/total pick
    default: "0.55"
  sql_warehouse_id:
    description: SQL warehouse ID for Genie space queries (set via .env / sync_bundle_env)
    default: ""
  genie_pick_metrics_space_id:
    description: Genie space ID for NFL Pick Metrics (synced from bundle state; required by nfl_copilot)
    default: ""
  genie_pick_miss_rca_space_id:
    description: Genie space ID for NFL Pick Miss RCA (synced from bundle state; required by nfl_copilot)
    default: ""

# Workspace host is per-operator: run `python scripts/sync_bundle_env.py` after
# `databricks auth login` so local VS Code gets a real host. Before commit/PR run
# `python scripts/sync_bundle_env.py --public-yml` (or rely on check_public_ready)
# to restore the placeholder. Never commit a real host or workspace profile.
targets:
  dev:
    mode: development
    workspace:
      host: https://dbc-xxxxxxxx-xxxx.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
  prod:
    mode: production
    default: true
    workspace:
      host: https://dbc-xxxxxxxx-xxxx.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
