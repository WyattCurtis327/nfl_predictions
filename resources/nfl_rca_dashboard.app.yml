resources:
  apps:
    nfl_rca_dashboard:
      name: nfl-rca-dashboard
      description: Root-cause analysis and team net rating analytics for NFL predictions.
      source_code_path: ../app/rca_dashboard
      lifecycle:
        started: true
      config:
        env:
          - name: DATABRICKS_WAREHOUSE_ID
            value_from: sql-warehouse
          - name: NFL_CATALOG
            value: ${var.catalog}
          - name: NFL_PREDICTIONS_SCHEMA
            value: ${var.predictions_schema}
          - name: NFL_PBP_SCHEMA
            value: ${var.pbp_schema}
          - name: NFL_SCHEDULE_SEASON
            value: ${var.schedule_season}
          - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
            value: "false"
      resources:
        - name: sql-warehouse
          description: SQL warehouse for RCA queries
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: prediction-grades-table
          description: Graded pick outcomes
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.predictions_schema}.prediction_grades
            permission: SELECT
        - name: prediction-rca-table
          description: Deterministic RCA rows
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.predictions_schema}.prediction_rca
            permission: SELECT
        - name: pick-miss-rca-view
          description: Joined misses and RCA
          uc_securable:
            securable_type: VIEW
            securable_full_name: ${var.catalog}.${var.predictions_schema}.pick_miss_rca
            permission: SELECT
        - name: play-by-play-table
          description: Play-by-play for team rating analytics
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.pbp_schema}.play_by_play
            permission: SELECT