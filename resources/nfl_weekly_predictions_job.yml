resources:
  jobs:
    nfl_weekly_predictions:
      name: nfl_weekly_predictions
      description: >
        Weekly Monte Carlo predictions for the next unplayed week and grading
        for the latest completed week.
      email_notifications:
        on_failure:
          - ${var.notify_email}
      environments:
        - environment_key: nfl_env
          spec:
            environment_version: "4"
            dependencies:
              - pandas>=2.0.0
              - pyarrow>=14.0.0
              - numpy>=1.26.0
              - mlflow>=2.14.0
              - ../dist/nfl_predictions-0.1.0-py3-none-any.whl
      tasks:
        - task_key: 00_ingest_odds_api
          environment_key: nfl_env
          notebook_task:
            notebook_path: ../notebooks/21_ingest_odds_api.py
            base_parameters:
              catalog: ${var.catalog}
              odds_schema: ${var.odds_schema}
              schedules_schema: ${var.schedules_schema}
              season: ${var.schedule_season}
              target_week: ""
              preferred_bookmaker: ${var.preferred_bookmaker}
              min_match_rate: ${var.min_match_rate}

        - task_key: 01_predict_upcoming_week
          environment_key: nfl_env
          depends_on:
            - task_key: 00_ingest_odds_api
          notebook_task:
            notebook_path: ../notebooks/50_predict_upcoming_week.py
            base_parameters:
              catalog: ${var.catalog}
              schedules_schema: ${var.schedules_schema}
              pbp_schema: ${var.pbp_schema}
              odds_schema: ${var.odds_schema}
              predictions_schema: ${var.predictions_schema}
              season: ${var.schedule_season}
              pbp_season: ${var.pbp_season}
              current_pbp_season: ${var.current_pbp_season}
              target_week: ""
              preferred_bookmaker: ${var.preferred_bookmaker}
              mlflow_experiment: ${var.mlflow_experiment}

        - task_key: 02_grade_elapsed_week
          environment_key: nfl_env
          depends_on:
            - task_key: 01_predict_upcoming_week
          notebook_task:
            notebook_path: ../notebooks/60_grade_elapsed_week.py
            base_parameters:
              catalog: ${var.catalog}
              schedules_schema: ${var.schedules_schema}
              predictions_schema: ${var.predictions_schema}
              mlflow_experiment: ${var.mlflow_experiment}

        - task_key: 03_apply_predictions_column_descriptions
          environment_key: nfl_env
          depends_on:
            - task_key: 01_predict_upcoming_week
            - task_key: 02_grade_elapsed_week
          notebook_task:
            notebook_path: ../notebooks/80_apply_uc_column_descriptions.py
            base_parameters:
              catalog: ${var.catalog}
              predictions_schema: ${var.predictions_schema}
              only_schema: predictions
              skip_missing_tables: "true"