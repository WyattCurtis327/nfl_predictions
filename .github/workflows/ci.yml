name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Build wheel
        run: python -m build --wheel -o dist

      - name: Validate bundle config (syntax)
        run: |
          grep -q 'name: nfl_predictions' databricks.yml
          grep -q '\${artifacts.nfl_predictions_wheel}' resources/nfl_bootstrap_job.yml
          grep -q 'host:' databricks.yml
          test -f resources/nfl_annual_refresh_job.yml